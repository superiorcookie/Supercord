<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Supercord Patcher</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="titlebar">
    <div class="drag-region"></div>
    <div class="window-controls">
      <button class="win-btn minimize" id="minimize-btn">
        <svg viewBox="0 0 10 1">
          <path d="M0,0 L10,0 L10,1 L0,1 Z" fill="currentColor" />
        </svg>
      </button>
      <button class="win-btn close" id="close-btn">
        <svg viewBox="0 0 10 10">
          <path d="M0,0 L1,0 L5,4 L9,0 L10,0 L10,1 L6,5 L10,9 L10,10 L9,10 L5,6 L1,10 L0,10 L0,9 L4,5 L0,1 Z"
            fill="currentColor" />
        </svg>
      </button>
    </div>
  </div>

  <div class="container">
    <div class="glow-orb"></div>
    <div class="content">
      <div class="header">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" class="logo">
          <rect width="250" height="250" rx="40" fill="#121212" />
          <path d="M 70 70 L 125 40 L 180 70 L 180 140 L 125 170" fill="none" stroke="#a03e44" stroke-width="22"
            stroke-linecap="round" stroke-linejoin="round" />
          <polygon points="125,100 146,112 146,137 125,150 104,137 104,112" fill="#611e23" />
          <line x1="125" y1="125" x2="70" y2="155" stroke="#f25c64" stroke-width="22" stroke-linecap="round" />
        </svg>
        <h1>Supercord</h1>
        <p class="subtitle">The ultimate Discord experience</p>
      </div>

      <div class="action-area">
        <div class="btn-group" style="display: flex; gap: 10px; justify-content: center; width: 100%;">
          <button id="patch-btn" class="patch-btn">
            <span class="btn-text">Install Supercord</span>
            <div class="btn-glow"></div>
          </button>

          <button id="unpatch-btn" class="patch-btn"
            style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);">
            <span class="btn-text" style="color: #ccc;">Uninstall</span>
          </button>
        </div>

        <div id="status-container" class="status-container hidden">
          <div class="progress-bar-bg">
            <div id="progress-bar" class="progress-bar-fill"></div>
          </div>
          <p id="status-text" class="status-text">Ready to patch</p>
        </div>

        <p id="version-info" class="version-info">Checking version...</p>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>

</html>
