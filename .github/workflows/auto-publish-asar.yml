name: Auto Publish ASAR

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  publish:
    name: Build & Publish ASAR
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Run publish:asar
        run: bun run publish:asar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
