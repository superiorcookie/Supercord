name: Build and Release Supercord

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build and Package Installer
        run: bun run build && bunx electron-builder --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Supercord-core and Patcher
        run: |
          cd Supercord-core
          npm install
          npm run build
          cd ..
          bun run build:patcher

      - name: Upload additional assets to Release
        run: gh release upload ${{ github.ref_name }} Supercord-core/dist/desktop.asar dist/SupercordPatcher.exe --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
